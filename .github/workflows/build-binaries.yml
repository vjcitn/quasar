name: Build quasar binaries

on:
  push:
  pull_request:

jobs:
  build:
    name: ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: quasar-linux-x86_64
            binary: build/quasar
            release_name: quasar-linux-x86_64
            cmake_extra: >-
              -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"

          - os: macos-14
            artifact: quasar-macos-arm64
            binary: build/quasar
            release_name: quasar-macos-arm64
            cmake_extra: ""

          - os: macos-13
            artifact: quasar-macos-x86_64
            binary: build/quasar
            release_name: quasar-macos-x86_64
            cmake_extra: ""

          - os: windows-latest
            artifact: quasar-windows-x86_64
            binary: build/Release/quasar.exe
            release_name: quasar-windows-x86_64.exe
            cmake_extra: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Boost (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libboost-dev

      - name: Install Boost (macOS)
        if: runner.os == 'macOS'
        run: brew install boost

      - name: Find Boost (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $d = Get-ChildItem C:\local -Filter boost_* -ErrorAction SilentlyContinue |
               Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty FullName
          if (-not $d) {
            choco install boost-msvc-14.3 --no-progress -y
            $d = Get-ChildItem C:\local -Filter boost_* |
                 Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty FullName
          }
          echo "BOOST_ROOT=$d" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "Boost found at $d"

      - name: Configure (Linux / macOS)
        if: runner.os != 'Windows'
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          ${{ matrix.cmake_extra }}

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -DBOOST_ROOT="${{ env.BOOST_ROOT }}"

      - name: Build
        run: cmake --build build --config Release

      - name: Rename binary for release
        shell: bash
        run: |
          mkdir -p dist
          cp ${{ matrix.binary }} dist/${{ matrix.release_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.release_name }}

  release:
    name: Publish latest pre-release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show collected binaries
        run: ls -lh dist/

      - name: Update latest pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build"
          prerelease: true
          make_latest: false
          body: |
            Automated build from commit ${{ github.sha }}.

            Download the binary for your platform:
            | Platform | File |
            |---|---|
            | Linux x86-64 | `quasar-linux-x86_64` |
            | macOS Apple Silicon | `quasar-macos-arm64` |
            | macOS Intel | `quasar-macos-x86_64` |
            | Windows x86-64 | `quasar-windows-x86_64.exe` |

            On Linux/macOS run `chmod +x quasar-*` after downloading.
          files: dist/*
